specVersion: "1.0.0"
document:
  id: workflows
  title: Workflow Spec (Commands, Policies, Scenarios)
  language: ko

commands:
  - id: CMD-001
    contextRef: BC-1
    name: ValidateDataBaseline
    actor: pipeline_runner
    preconditions: [INV-001]
    inputSchemaRef: data.yaml#/schemas/data_gate_request
    successEvents: [EVT-010]
    failureErrors: [SPLIT_OVERLAP, SPLIT_MISSING_PATH]

  - id: CMD-002
    contextRef: BC-2
    name: BuildPyGFromCPG
    actor: pipeline_runner
    preconditions: []
    inputSchemaRef: data.yaml#/schemas/pyg_build_request
    successEvents: [EVT-001]
    failureErrors: [CPG_PARSE_FAILED]

  - id: CMD-003
    contextRef: BC-3
    name: BuildEmbeddings
    actor: pipeline_runner
    preconditions: [INV-002, INV-003]
    inputSchemaRef: data.yaml#/schemas/embedding_build_request
    successEvents: [EVT-011]
    failureErrors: [VECTOR_DIM_MISMATCH, VECTOR_VALUE_INVALID]

  - id: CMD-004
    contextRef: BC-3
    name: IndexVectorsToQdrant
    actor: pipeline_runner
    preconditions: [INV-002]
    inputSchemaRef: interfaces.yaml#/vectorDB/indexRequestSchema
    successEvents: [EVT-002]
    failureErrors: [QDRANT_UNAVAILABLE, PAYLOAD_SCHEMA_INVALID]

  - id: CMD-005
    contextRef: BC-4
    name: RunHybridInference
    actor: inference_service
    preconditions: [INV-002]
    inputSchemaRef: interfaces.yaml#/apis/hybrid_inference/requestSchema
    successEvents: [EVT-012]
    failureErrors: [INFERENCE_FAILED]

policies:
  - id: POL-001
    triggerEventRef: EVT-011
    conditions:
      - vector_count > 0
    resultingCommands: [CMD-004]

  - id: POL-002
    triggerEventRef: EVT-012
    conditions:
      - confidence < 0.65
    resultingCommands: []
    resultingEvents: [EVT-013]

  - id: POL-003
    triggerEventRef: EVT-002
    conditions:
      - retrieval_quality_pass == true
    resultingCommands: [CMD-005]

  - id: POL-004
    triggerEventRef: EVT-002
    conditions:
      - retrieval_quality_pass == false
    resultingCommands: []
    resultingEvents: [EVT-014]

scenarios:
  - id: SCN-001
    commandRef: CMD-001
    given:
      split_total: 7917
      metadata_total: 7918
      overlap_count: 0
      missing_path_count: 0
    when:
      allow_total_delta: 1
    then:
      emits:
        - event: EVT-010
          data:
            status: pass_with_warning
            warning: metadata_split_delta_1
      idempotencyExpectation: deterministic

  - id: SCN-002
    commandRef: CMD-003
    given:
      expected_dim: 768
      sample_file: data/pyg_embedded/safe_00236.pt
    when:
      embedding_source: gnn
    then:
      emits:
        - event: EVT-011
          data:
            dim: 768
      idempotencyExpectation: deterministic

  - id: SCN-003
    commandRef: CMD-004
    given:
      collection: primevul_train_v2
      metric: cosine
    when:
      upsert_batch_size: 256
    then:
      emits:
        - event: EVT-002
          data:
            indexed: true
      idempotencyExpectation: at_least_once

  - id: SCN-004
    commandRef: CMD-005
    given:
      retrieval_quality_pass: false
      requirement_ref: R-003
    when:
      run_hybrid_requested: true
    then:
      emits:
        - event: EVT-014
          data:
            status: skipped_by_quality_gate
            reason: R-003_not_satisfied
      idempotencyExpectation: deterministic

events:
  - id: EVT-010
    name: DataGateCompleted
  - id: EVT-011
    name: EmbeddingBuildCompleted
  - id: EVT-012
    name: HybridInferenceCompleted
  - id: EVT-013
    name: HumanReviewRequired
  - id: EVT-014
    name: HybridInferenceSkipped
