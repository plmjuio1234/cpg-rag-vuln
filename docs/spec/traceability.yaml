specVersion: "1.0.0"
document:
  id: traceability
  title: Claim to Requirement to Experiment Mapping
  language: ko

claims:
  - id: C-001
    summary: CPG 구조정보는 text-only 대비 탐지 성능 향상에 기여한다.
    paperRef: "Section 3-4"
    requirements: [R-001]
    experiments: [E-001, E-002]
    artifacts:
      - results/RUN-*/metrics_gnn_vs_baseline.json
    status: pending

  - id: C-002
    summary: 임베딩 기반 유사도 검색은 검증 품질 개선에 기여한다.
    paperRef: "Section 3"
    requirements: [R-002, R-003]
    experiments: [E-002]
    artifacts:
      - results/RUN-*/retrieval_eval.json
    status: pending

  - id: C-003
    summary: LLM 보정은 조건부로 성능 개선 가능하다.
    paperRef: "Section 4"
    requirements: [R-003, R-005]
    experiments: [E-003]
    artifacts:
      - results/RUN-*/hybrid_eval.json
    status: pending

  - id: C-004
    summary: 파이프라인은 재현 가능해야 한다.
    paperRef: "Method/Evaluation"
    requirements: [R-004]
    experiments: [E-001, E-002, E-003, E-004]
    artifacts:
      - results/RUN-*/run_meta.json
    status: in_progress

experiments:
  - id: E-000
    name: Data Integrity Gate
    output:
      - results/RUN-*/data_integrity_report.json
  - id: E-001
    name: GNN only baseline
    output:
      - results/RUN-*/gnn_only_eval.json
  - id: E-002
    name: GNN + Retrieval
    output:
      - results/RUN-*/retrieval_eval.json
  - id: E-003
    name: GNN + Retrieval + LLM
    output:
      - results/RUN-*/hybrid_eval.json
  - id: E-004
    name: CodeBERT augmentation ablation
    output:
      - results/RUN-*/codebert_ablation.json
