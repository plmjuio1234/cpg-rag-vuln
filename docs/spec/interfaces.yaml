specVersion: "1.0.0"
document:
  id: interfaces
  title: System Interface Contracts
  language: ko

apis:
  hybrid_inference:
    id: API-001
    ownerContextRef: BC-4
    style: http
    basePath: /v1
    endpoints:
      - id: EP-001
        method: POST
        path: /infer/hybrid
        auth: internal_only
        requestSchema:
          required: [sample_id, code, top_k]
          properties:
            sample_id: string
            code: string
            top_k: int
            anchor_threshold: float
        responseSchemas:
          - status: 200
            properties:
              sample_id: string
              anchor_prediction: int
              final_prediction: int
              confidence: float
              retrieved_ids: list[string]
        errors:
          - code: INFERENCE_FAILED
            httpStatus: 500
        idempotency: false

vectorDB:
  provider: qdrant
  host: localhost
  port: 6333
  collection: primevul_train_v2
  distance: cosine
  vectorSize: 768
  payloadSchema:
    required: [id, sample_id, label, path]
    properties:
      id: int
      sample_id: string
      label: int
      cwe: string
      path: string
  indexRequestSchema:
    required: [collection, vectors_path, metadata_path]
    properties:
      collection: string
      vectors_path: path
      metadata_path: path
      hnsw_m: int
      ef_construct: int
      hnsw_ef: int
      eval_exact_knn: bool

messaging:
  topics:
    - id: TOPIC-001
      name: data_gate.completed
      messageSchemaRef: workflows.yaml#/events/EVT-010
      deliverySemantics: at_least_once
