specVersion: "1.0.0"
document:
  id: domain
  title: DDD Domain Spec
  language: ko

boundedContexts:
  - id: BC-1
    name: Data Ingestion
    purpose: 원본 데이터 수집/정규화/라벨 보전
    owners: [team-data]
    dependencies: []
    integration: file_batch

  - id: BC-2
    name: Graph Construction
    purpose: CPG 생성 및 PyG 변환
    owners: [team-graph]
    dependencies: [BC-1]
    integration: file_batch

  - id: BC-3
    name: Embedding and Retrieval
    purpose: GNN/CodeBERT 임베딩과 VectorDB 인덱싱
    owners: [team-ml]
    dependencies: [BC-2]
    integration: service

  - id: BC-4
    name: Detection and Verification
    purpose: Anchor 예측과 LLM 검증 결합
    owners: [team-inference]
    dependencies: [BC-3]
    integration: service

  - id: BC-5
    name: Evaluation and Governance
    purpose: 실험 통제, 지표, 추적성 관리
    owners: [team-research]
    dependencies: [BC-1, BC-2, BC-3, BC-4]
    integration: report

aggregates:
  - id: AGG-001
    contextRef: BC-1
    name: SampleSet
    rootEntity: ENT-001
    responsibilities:
      - raw 샘플과 라벨 상태 관리
      - split 전 샘플 정합성 보장

  - id: AGG-002
    contextRef: BC-2
    name: GraphSet
    rootEntity: ENT-002
    responsibilities:
      - CPG/PyG 변환 결과 관리

  - id: AGG-003
    contextRef: BC-3
    name: RetrievalIndex
    rootEntity: ENT-003
    responsibilities:
      - 임베딩 벡터 인덱스 및 payload 계약 보장

entities:
  - id: ENT-001
    aggregateRef: AGG-001
    name: SampleRecord
    identityField: sample_id
    fields:
      - name: sample_id
        type: string
      - name: target
        type: int
      - name: cwe
        type: list[string]

  - id: ENT-002
    aggregateRef: AGG-002
    name: GraphRecord
    identityField: graph_id
    fields:
      - name: graph_id
        type: string
      - name: x_dim
        type: int
      - name: edge_count
        type: int

  - id: ENT-003
    aggregateRef: AGG-003
    name: VectorPoint
    identityField: vector_id
    fields:
      - name: vector_id
        type: int
      - name: sample_id
        type: string
      - name: dim
        type: int

valueObjects:
  - id: VO-001
    name: SplitPolicy
    fields:
      - name: train
        type: list[path]
      - name: val
        type: list[path]
      - name: test
        type: list[path]
    constraints:
      - no_overlap
      - no_missing_path

invariants:
  - id: INV-001
    scopeRef: AGG-001
    rule: train/val/test overlap count == 0
    violationError:
      code: SPLIT_OVERLAP
      message: split overlap is not allowed

  - id: INV-002
    scopeRef: AGG-003
    rule: vector dim == 768
    violationError:
      code: VECTOR_DIM_MISMATCH
      message: vector dimension must be 768

  - id: INV-003
    scopeRef: AGG-003
    rule: nan_count == 0 and inf_count == 0
    violationError:
      code: VECTOR_VALUE_INVALID
      message: vectors must not contain NaN or Inf

domainEvents:
  - id: EVT-001
    contextRef: BC-2
    name: PygConverted
    schemaRef: data.yaml#/schemas/pyg_record
    emittedWhen: CPG to PyG conversion succeeds

  - id: EVT-002
    contextRef: BC-3
    name: VectorIndexed
    schemaRef: interfaces.yaml#/vectorDB/payloadSchema
    emittedWhen: embedding vector is upserted to vector DB
