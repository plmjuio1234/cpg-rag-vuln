specVersion: "1.0.0"
document:
  id: quality
  title: Quality Requirements
  language: ko

requirements:
  - id: R-001
    scopeRef: BC-2
    type: integrity
    target: split_overlap == 0
    measurement: data_gate_report.overlap_count
    failureMode: block_pipeline

  - id: R-002
    scopeRef: BC-3
    type: vector_contract
    target: vector_dim == 768
    measurement: embedding_report.vector_dim
    failureMode: block_indexing

  - id: R-003
    scopeRef: BC-3
    type: retrieval_quality
    target: class_hit_at_10 >= 0.90 and precision_at_10_exact >= 0.60
    measurement: ann_eval.metrics.gnn.class_hit_at_10 + ann_eval.metrics.gnn.precision_at_10_exact (ANN-vs-Exact top10 overlap, requires exact_eval_enabled=true)
    failureMode: do_not_run_llm_hybrid

  - id: R-004
    scopeRef: BC-5
    type: reproducibility
    target: same_seed_metric_delta <= 0.01
    measurement: repeated_runs.metric_delta
    failureMode: mark_unstable

  - id: R-005
    scopeRef: BC-4
    type: safety
    target: low_confidence_requires_review == true
    measurement: inference_log.review_flag
    failureMode: block_auto_verdict
