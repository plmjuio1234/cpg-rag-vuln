specVersion: "1.0.0"
document:
  id: data
  title: Data Contracts and Gates
  language: ko

datasets:
  - id: D-001
    name: primevul
    sourcePaths:
      - data/raw/primevul/primevul_train.jsonl
      - data/raw/primevul/primevul_valid.jsonl
      - data/raw/primevul/primevul_test.jsonl

  - id: D-002
    name: devign
    sourcePaths:
      - data/raw/devign/devign_train.jsonl
      - data/raw/devign/devign_validation.jsonl
      - data/raw/devign/devign_test.jsonl

baselineStats:
  metadata_total: 7918
  split_total: 7917
  split_counts:
    train: 5541
    val: 1188
    test: 1188
  overlap_count: 0
  duplicate_count: 0
  missing_split_paths: 0
  allow_total_delta: 1

schemas:
  data_gate_request:
    required: [split_path, metadata_path, allow_total_delta]
    properties:
      split_path: path
      metadata_path: path
      allow_total_delta: int

  pyg_build_request:
    required: [input_cpg_dir, output_pyg_dir]
    properties:
      input_cpg_dir: path
      output_pyg_dir: path

  embedding_build_request:
    required: [input_pyg_dir, output_path, embedding_source, expected_dim]
    properties:
      input_pyg_dir: path
      output_path: path
      embedding_source: enum[gnn, raw_codebert_cls, raw_codebert_mean]
      expected_dim: int

  pyg_record:
    required: [x, edge_index, node_type, edge_type, y]
    properties:
      x: float_tensor[n,768]
      edge_index: int_tensor[2,m]
      node_type: int_tensor[n]
      edge_type: int_tensor[m]
      y: int_tensor[1]
      sample_id: string
      cwe_type: string
      code_snippets: list[string]

integrityGates:
  - id: G-D1
    description: split overlap/missing/duplicate 검사
    passCondition:
      overlap_count: 0
      duplicate_count: 0
      missing_split_paths: 0

  - id: G-D2
    description: metadata/split count delta 검사
    passCondition:
      abs_delta_lte: 1

  - id: G-D3
    description: 임베딩 차원 검사
    passCondition:
      expected_dim: 768

  - id: G-D4
    description: NaN/Inf 검사
    passCondition:
      nan_count: 0
      inf_count: 0
