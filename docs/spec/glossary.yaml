specVersion: "1.0.0"
document:
  id: glossary
  title: Ubiquitous Language
  language: ko

terms:
  - id: TERM-001
    term: Raw Sample
    aliases: [원본 샘플]
    forbiddenAliases: [raw_data_item]
    contextRef: BC-1
    definition: 원본 jsonl 레코드 단위의 코드 샘플.
    examples:
      - source: data/raw/primevul/primevul_train.jsonl

  - id: TERM-002
    term: Filtered Sample
    aliases: [정제 샘플]
    contextRef: BC-1
    definition: 취약/안전 라벨이 정규화된 json 샘플.
    examples:
      - source: data/filtered/vulnerable/sample_00050.json

  - id: TERM-003
    term: CPG Artifact
    aliases: [CPG 산출물]
    contextRef: BC-2
    definition: 코드에서 추출된 CPG xml/meta 파일 쌍.
    examples:
      - source: data/cpg/

  - id: TERM-004
    term: PyG Graph
    aliases: [PyG 그래프]
    contextRef: BC-2
    definition: GNN 입력으로 변환된 torch-geometric 그래프 텐서.
    examples:
      - source: data/pyg/

  - id: TERM-005
    term: Embedded Graph
    aliases: [임베딩 그래프]
    contextRef: BC-3
    definition: 노드 피처/그래프 임베딩이 포함된 그래프 산출물.
    examples:
      - source: data/pyg_embedded/

  - id: TERM-006
    term: Anchor Prediction
    aliases: [앵커 예측]
    contextRef: BC-4
    definition: GNN 단독 판정 결과.
    examples:
      - text: vulnerable

  - id: TERM-007
    term: Retrieval Candidate
    aliases: [검색 후보]
    contextRef: BC-3
    definition: 벡터 유사도 검색 Top-k 이웃 샘플.
    examples:
      - text: top5 neighbors

  - id: TERM-008
    term: Final Verdict
    aliases: [최종 판정]
    contextRef: BC-4
    definition: LLM 검증을 반영한 최종 라벨.
    examples:
      - text: safe
